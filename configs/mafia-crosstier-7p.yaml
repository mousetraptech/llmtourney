# Mafia — 7-player cross-tier exhibition
# Hidden role social deduction: 5 town / 2 mafia
# HW: opus, grok-3 | Mid: sonnet, gpt-4o, gemini-flash | Bantam: haiku, deepseek

tournament:
  name: "mafia-crosstier-7p"
  seed: 42
  format: round_robin
  version: "0.1.0"

models:
  claude-opus-4.6:
    provider: openrouter
    model_id: anthropic/claude-opus-4.6
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
    max_output_tokens: 1024
    timeout_s: 120.0

  grok-3:
    provider: openrouter
    model_id: x-ai/grok-3
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
    max_output_tokens: 1024
    timeout_s: 120.0

  claude-sonnet-4.5:
    provider: openrouter
    model_id: anthropic/claude-sonnet-4-5-20241022
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
    max_output_tokens: 1024
    timeout_s: 45.0

  gpt-4o:
    provider: openrouter
    model_id: openai/gpt-4o
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
    max_output_tokens: 1024
    timeout_s: 45.0

  gemini-2.5-flash:
    provider: openrouter
    model_id: google/gemini-2.5-flash-preview
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
    max_output_tokens: 1024
    timeout_s: 45.0

  haiku-4.5:
    provider: openrouter
    model_id: anthropic/claude-haiku-4-5
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
    max_output_tokens: 1024
    timeout_s: 45.0

  deepseek-chat:
