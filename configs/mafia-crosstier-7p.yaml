    temperature: 0.0
    max_output_tokens: 1024
    timeout_s: 45.0

events:
  mafia:
    weight: 1
    games_per_match: 5

shot_clock:
  default_ms: 60000
  model_overrides:
    claude-opus-4.6: 120000
    grok-3: 120000

forfeit_escalation:
  turn_forfeit_threshold: 1
  match_forfeit_threshold: 3

compute_caps:
  max_output_tokens: 1024
  timeout_s: 45.0
