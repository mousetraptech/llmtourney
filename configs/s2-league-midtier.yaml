tournament:
  name: "s2-league-midtier"
  seed: 2002
  format: league
  version: "2.1.0"

# ── S2 Midtier League v2.1 ──────────────────────────────────────
# 7-seat multiplayer league. Five events.
# Dropped mistral-medium-3.1 and qwen3-235b (repeated DQs).
# Liar's Dice trimmed to 1 round — elimination produces natural ranking.
# Roller Derby: concurrent Yahtzee racing. Gauntlet: obstacle-course racing.

models:
  gpt-4o:
    provider: openrouter
    model_id: openai/gpt-4o
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
    max_output_tokens: 512
    timeout_s: 45.0

  command-a:
    provider: openrouter
    model_id: cohere/command-a-03-2025
    api_key_env: OPENROUTER_API_KEY
