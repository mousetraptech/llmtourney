events:
  holdem:
    weight: 1
    hands_per_match: 75
    starting_stack: 300
    blinds: [1, 2]
    blind_schedule:
      20: [2, 4]
      35: [4, 8]
      50: [8, 16]
      65: [16, 32]
    rounds: 1

  bullshit:
    weight: 1
    games_per_match: 1
    rounds: 1

  liarsdice:
    weight: 1
    games_per_match: 1
    mode: redistribution
    rounds: 1

  rollerderby:
    weight: 1
    games_per_match: 1
    rounds: 1
    mode: concurrent
    finish_bonus: [3, 2, 1]
    race_timeout_s: 300

  gauntlet:
    weight: 1
    games_per_match: 3
    rounds: 1
    mode: concurrent
    finish_bonus: [3, 2, 1]
    race_timeout_s: 300

shot_clock:
  default_ms: 45000

forfeit_escalation:
  turn_forfeit_threshold: 1
  match_forfeit_threshold: 3

compute_caps:
  max_output_tokens: 512
  timeout_s: 45.0
