tournament:
  name: "storyteller-hints-behavioral-r1"
  seed: 3107
  format: single_match
  version: "2.0.0"

# ── Diegetic Hints Behavioral Match R1 ──────────────────────────
# 8 players, 1 Storyteller match, hints_per_game=3
# Purpose: First real behavioral read on diegetic hint responsiveness
# across a mixed-tier field.
#
# Research question: Does hint responsiveness correlate with general
# model capability, or is it its own axis?
#
# Model selection:
#   claude-sonnet-4-5   Heavy  S2 champion, clean integration in smoke test
#   claude-opus-4.6     Heavy  Strongest theory-of-mind, first Storyteller appearance
#   gpt-4o              Heavy  Disciplined minimalism, subtle BREVITY user in smoke test
#   grok-3              Heavy  Consistent S2, unknown creative register
#   haiku-4-5           Mid    Explicit BREVITY clean integration in smoke test (+2.33)
#   deepseek-chat       Mid    Avalon invisible Merlin -- situational awareness unknown in creative
#   gemini-2.5-flash    Mid    Storyteller behavior unknown
#   grok-3-mini         Bantam Verbosity issues in Hearts -- will it over-write through hints?

models:
  claude-sonnet-4-5:
    provider: openrouter
    model_id: anthropic/claude-sonnet-4.5
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 60.0

  claude-opus-4-6:
    provider: openrouter
    model_id: anthropic/claude-opus-4.6
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 90.0

  gpt-4o:
    provider: openrouter
    model_id: openai/gpt-4o
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 60.0

  grok-3:
    provider: openrouter
    model_id: x-ai/grok-3
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 60.0

  haiku-4-5:
    provider: openrouter
    model_id: anthropic/claude-haiku-4.5
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 60.0

  deepseek-chat:
    provider: openrouter
    model_id: deepseek/deepseek-chat
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 60.0

  gemini-2-5-flash:
    provider: openrouter
    model_id: google/gemini-2.5-flash
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 60.0

  grok-3-mini:
    provider: openrouter
    model_id: x-ai/grok-3-mini
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0
    max_output_tokens: 1024
    timeout_s: 60.0

events:
  storyteller:
    weight: 1
    games_per_match: 1
    hints_per_game: 3

shot_clock:
  default_ms: 60000

forfeit_escalation:
  turn_forfeit_threshold: 1
  match_forfeit_threshold: 3

compute_caps:
  max_output_tokens: 1024
  timeout_s: 90.0
