tournament:
  name: "spades-test-match"
  seed: 42
  format: round_robin
  version: "0.1.0"

models:
  claude-haiku-4.5:
    provider: openrouter
    model_id: anthropic/claude-haiku-4.5
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
  gpt-4o:
    provider: openrouter
    model_id: openai/gpt-4o
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
  claude-sonnet-4.5:
    provider: openrouter
    model_id: anthropic/claude-sonnet-4.5
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0
  grok-3-mini:
    provider: openrouter
    model_id: x-ai/grok-3-mini
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.0

events:
  spades:
    weight: 1
    games_per_match: 1

shot_clock:
  default_ms: 30000

forfeit_escalation:
  turn_forfeit_threshold: 1
  match_forfeit_threshold: 3

compute_caps:
  max_output_tokens: 1024
  timeout_s: 45.0
